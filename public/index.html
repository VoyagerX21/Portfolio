<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio — Python & Backend Dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"
    ></script>
    <script type="text/javascript">
      (function () {
        emailjs.init({
          publicKey: "QBBjov6usdFUBWvGR",
        });
      })();
    </script>
    <style>
      :root {
        --bg: #0d0f14;
        --surface: #13161e;
        --surface2: #1a1e2a;
        --border: #1e2330;
        --python-blue: #4b8bbe;
        --python-yellow: #ffd43b;
        --accent: #00d9a3;
        --accent2: #7c6af7;
        --text: #e4e8f0;
        --muted: #5c6478;
        --dim: #8b92a5;
        --red: #ff5d5d;
        --glow: rgba(0, 217, 163, 0.12);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Syne", sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
        cursor: none;
      }

      /* CUSTOM CURSOR */
      .cursor {
        position: fixed;
        width: 10px;
        height: 10px;
        background: var(--accent);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition:
          width 0.2s,
          height 0.2s,
          background 0.2s;
        mix-blend-mode: screen;
      }
      .cursor-ring {
        position: fixed;
        width: 36px;
        height: 36px;
        border: 1.5px solid var(--accent);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        transition:
          transform 0.08s,
          width 0.2s,
          height 0.2s,
          opacity 0.2s;
        opacity: 0.5;
      }
      body:has(a:hover) .cursor {
        width: 16px;
        height: 16px;
        background: var(--python-yellow);
      }
      body:has(a:hover) .cursor-ring {
        width: 52px;
        height: 52px;
        border-color: var(--python-yellow);
        opacity: 0.3;
      }

      /* NOISE OVERLAY */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 1;
        opacity: 0.35;
      }

      /* NAV */
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 1.2rem 3rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(13, 15, 20, 0.85);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
      }

      .nav-logo {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.9rem;
        color: var(--accent);
        letter-spacing: 0.05em;
      }
      .nav-logo span {
        color: var(--python-yellow);
      }

      .nav-links {
        display: flex;
        gap: 2.5rem;
        list-style: none;
      }
      .nav-links a {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        color: var(--dim);
        text-decoration: none;
        letter-spacing: 0.08em;
        transition: color 0.2s;
        position: relative;
      }
      .nav-links a::before {
        content: "# ";
        color: var(--muted);
      }
      .nav-links a:hover {
        color: var(--accent);
      }

      /* SECTIONS */
      section {
        position: relative;
        z-index: 2;
        padding: 7rem 3rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      /* HERO */
      #hero {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-top: 8rem;
        max-width: 100%;
        padding-left: 8vw;
        padding-right: 8vw;
      }

      .hero-eyebrow {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        color: var(--accent);
        letter-spacing: 0.15em;
        margin-bottom: 1.5rem;
        opacity: 0;
        animation: fadeUp 0.7s ease forwards 0.2s;
      }

      .hero-name {
        font-size: clamp(3.5rem, 9vw, 8rem);
        font-weight: 500;
        line-height: 0.95;
        letter-spacing: -0.03em;
        margin-bottom: 1.5rem;
        opacity: 0;
        animation: fadeUp 0.7s ease forwards 0.35s;
      }

      .hero-name .line2 {
        color: transparent;
        -webkit-text-stroke: 1.5px var(--border);
        display: block;
        position: relative;
      }
      .hero-name .line2 .fill {
        position: absolute;
        left: 0;
        color: var(--python-yellow);
        -webkit-text-stroke: 0;
        width: 0;
        overflow: hidden;
        white-space: nowrap;
        animation: textReveal 1.2s ease forwards 1s;
      }

      @keyframes textReveal {
        to {
          width: 100%;
        }
      }

      .hero-tagline {
        font-family: "JetBrains Mono", monospace;
        font-size: clamp(0.85rem, 1.5vw, 1.05rem);
        color: var(--dim);
        max-width: 540px;
        line-height: 1.8;
        margin-bottom: 3rem;
        opacity: 0;
        animation: fadeUp 0.7s ease forwards 0.5s;
      }
      .hero-tagline .hl {
        color: var(--accent);
      }

      .hero-cta {
        display: flex;
        gap: 1.2rem;
        opacity: 0;
        animation: fadeUp 0.7s ease forwards 0.65s;
      }

      .btn {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        letter-spacing: 0.1em;
        padding: 0.85rem 2rem;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.25s;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }
      .btn-primary {
        background: var(--accent);
        color: var(--bg);
        border: none;
        font-weight: 600;
      }
      .btn-primary:hover {
        background: #00f0b5;
        box-shadow: 0 0 24px rgba(0, 217, 163, 0.4);
        transform: translateY(-2px);
      }
      .btn-ghost {
        background: transparent;
        color: var(--dim);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        border-color: var(--accent);
        color: var(--accent);
        transform: translateY(-2px);
      }

      /* Floating code block */
      .hero-code {
        position: absolute;
        right: 6vw;
        top: 50%;
        transform: translateY(-50%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1.5rem 2rem;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        line-height: 2;
        color: var(--dim);
        width: 360px;
        opacity: 0;
        animation: fadeLeft 0.8s ease forwards 1s;
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
      }
      .hero-code::before {
        content: "";
        position: absolute;
        top: -1px;
        left: 20px;
        right: 20px;
        height: 2px;
        background: linear-gradient(90deg, var(--python-blue), var(--accent));
        border-radius: 0 0 2px 2px;
      }
      .code-dots {
        display: flex;
        gap: 6px;
        margin-bottom: 1.2rem;
      }
      .code-dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .code-dots span:nth-child(1) {
        background: var(--red);
      }
      .code-dots span:nth-child(2) {
        background: var(--python-yellow);
      }
      .code-dots span:nth-child(3) {
        background: var(--accent);
      }

      .kw {
        color: var(--accent2);
      }
      .fn {
        color: var(--python-blue);
      }
      .str {
        color: var(--python-yellow);
      }
      .cm {
        color: var(--muted);
      }
      .op {
        color: var(--accent);
      }
      .typing-cursor {
        display: inline-block;
        width: 2px;
        height: 1em;
        background: var(--accent);
        animation: blink 1s step-end infinite;
        vertical-align: text-bottom;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* SECTION HEADINGS */
      .sec-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.72rem;
        color: var(--accent);
        letter-spacing: 0.2em;
        margin-bottom: 0.8rem;
      }
      .sec-title {
        font-size: clamp(2rem, 4vw, 3rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 3.5rem;
        line-height: 1;
      }
      .sec-title span {
        color: var(--python-yellow);
      }

      /* SKILLS */
      #skills {
        background: var(--surface);
        border-radius: 20px;
        max-width: 1200px;
      }

      /* SKILLS — TECH SPEC LAYOUT */
      .skills-spec {
        display: flex;
        flex-direction: column;
        gap: 0;
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
      }
      /* ... rest of original styles preserved ... */
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
